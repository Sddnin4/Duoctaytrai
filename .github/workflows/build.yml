name: Tự Động Build Plugin 1.21

on:
  push:
    branches: [ "main", "master" ] # Tự chạy khi push code lên nhánh main hoặc master
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy code từ repo về máy ảo GitHub
    - name: Kiểm tra Code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Java 21 (Bắt buộc cho Minecraft 1.21)
    - name: Cài đặt JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Tự động nhớ các thư viện Paper để lần sau build nhanh hơn

    # Bước 3: Chạy lệnh build của Maven
    - name: Biên dịch với Maven
      run: mvn clean package --file pom.xml

    # Bước 4: Đẩy file .jar sau khi build xong lên mục Artifacts để tải về
    - name: Lưu trữ sản phẩm (.jar)
      uses: actions/upload-artifact@v4
      with:
        name: LeftHandTorch-Plugin
        path: target/*.jar
